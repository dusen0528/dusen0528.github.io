<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    {% if page.title %}
      {% if page.title contains '|' %}
        {{ page.title }}
      {% else %}
        {{ page.title }} | {{ site.title }}
      {% endif %}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>
  <meta
    name="description"
    content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}"
  />
  <meta name="theme-color" content="{{ site.theme_color }}" />
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}" />
  <meta
    property="og:description"
    content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}"
  />
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% feed_meta %}
</head>
